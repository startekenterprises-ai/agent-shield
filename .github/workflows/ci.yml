name: Agent-Shield CI Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  validate:
    runs-size: ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - name: Checkout Repository Codebase
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest bandit
        pip install -e .

    - name: 🔒 Run Bandit Security Static Code Analysis
      run: |
        # Scans python files for insecure code injections, eval calls, or hardcoded secrets
        bandit -r agent_shield/ api/ -ll

    - name: 🧪 Execute Validation Test Harness
      run: |
        pytest tests/test_core.py

